              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: openshift-fake-gpu-operator
                control-plane: controller-manager
            spec:
              containers:
