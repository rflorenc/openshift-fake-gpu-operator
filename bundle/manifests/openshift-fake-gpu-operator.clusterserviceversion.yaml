  description: |
    ## OpenShift Fake GPU Operator

    Simulates NVIDIA GPU resources on CPU-only OpenShift nodes, enabling development
    and testing of GPU-dependent workloads without physical hardware.

    ### Features

    - Simulates full GPUs and MIG partitions on any worker node
    - Supports 7 GPU profiles: A100, H100, H200, B200, GB200, L40S, T4
    - Registers `nvidia.com/gpu` and MIG slice resources with kubelet
    - Exports Prometheus-compatible DCGM metrics
    - Declarative CRD-driven configuration via `FakeGPUConfig`
    - Automatic node labeling and topology management
    - Detects and prevents conflicts with Helm-installed fake-gpu-operator

    ### Use Cases

    - Testing Kueue GPU quota and scheduling without GPUs
    - Developing RHOAI workbenches and pipelines in non-GPU environments
    - CI/CD pipeline validation for GPU workloads
    - Training and workshop environments

    ### Quick Start

    1. Install the operator from OperatorHub
    2. Create a `FakeGPUConfig` resource targeting your worker nodes
    3. GPU resources appear on nodes automatically

    ```yaml
    apiVersion: gpu.openshift.io/v1alpha1
    kind: FakeGPUConfig
    metadata:
      name: training-pool
    spec:
      gpuProfile: h200
      gpuCount: 8
      nodeSelector:
        node-role.kubernetes.io/worker: ""
    ```
