name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Operator image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/rlourencc/openshift-fake-gpu-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate OLM bundle
        run: |
          make bundle IMG=quay.io/rlourencc/openshift-fake-gpu-operator:${{ steps.version.outputs.version }} VERSION=${{ steps.version.outputs.version }}
          sed -i '/project_layout/a\  operators.operatorframework.io.bundle.channel.default.v1: alpha\n  com.redhat.openshift.versions: "v4.14-v4.21"' bundle/metadata/annotations.yaml
          sed -i '/project_layout/a\LABEL com.redhat.openshift.versions="v4.14-v4.21"' bundle.Dockerfile

      - name: Bundle image metadata
        id: bundle-meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/rlourencc/openshift-fake-gpu-operator-bundle
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push bundle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bundle.Dockerfile
          push: true
          tags: ${{ steps.bundle-meta.outputs.tags }}
          labels: ${{ steps.bundle-meta.outputs.labels }}

      - name: Generate install manifest
        run: make build-installer IMG=quay.io/rlourencc/openshift-fake-gpu-operator:${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/install.yaml
