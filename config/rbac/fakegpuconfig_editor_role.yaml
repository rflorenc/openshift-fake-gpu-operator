# This rule is not used by the project openshift-fake-gpu-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the gpu.openshift.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openshift-fake-gpu-operator
    app.kubernetes.io/managed-by: kustomize
  name: fakegpuconfig-editor-role
rules:
- apiGroups:
  - gpu.openshift.io
  resources:
  - fakegpuconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gpu.openshift.io
  resources:
  - fakegpuconfigs/status
  verbs:
  - get
