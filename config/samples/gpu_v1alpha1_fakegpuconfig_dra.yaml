apiVersion: gpu.openshift.io/v1alpha1
kind: FakeGPUConfig
metadata:
  name: dra-pool
spec:
  gpuProfile: a100
  gpuCount: 8
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  mig:
    enabled: true
    strategy: mixed
    devices:
      - name: 1g.5gb
        count: 7
      - name: 2g.10gb
        count: 3
      - name: 3g.20gb
        count: 2
  components:
    devicePlugin: true
    statusUpdater: true
    metricsExporter: true
    topologyServer: true
    dra: true
    computeDomainController: true
